<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台大 × 大吸館：校園大滿貫任務</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --ntu-red: #8B0000; --gold: #D4AF37; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; background: #f4f4f4; overflow: hidden; }
        header { background: var(--ntu-red); color: white; padding: 15px; text-align: center; font-weight: bold; position: relative; z-index: 1000; }
        #map { width: 100%; height: 50vh; border-bottom: 2px solid #ccc; }
        .red-marker { filter: hue-rotate(140deg) brightness(0.9); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; max-width: 380px; border-radius: 25px; padding: 30px; text-align: center; position: relative; }
        
        .btn-main { background: var(--ntu-red); color: white; border: none; padding: 16px; border-radius: 35px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .barcode-box { background: #f0f0f0; border: 2px dashed #999; padding: 15px; margin: 10px 0; font-family: monospace; font-size: 18px; letter-spacing: 1px; color: #333; }
        
        #camera-trigger { display: none; }
        #test-btn { position: fixed; bottom: 10px; right: 10px; font-size: 10px; padding: 5px; opacity: 0.5; z-index: 3000; }
    </style>
</head>
<body>

<header>大吸館：校園有料靈魂地圖</header>
<div id="map"></div>

<!-- 1. 入口對話框 -->
<div class="modal" id="modal-welcome" style="display:flex;">
    <div class="modal-content">
        <h2>有料地圖啟動！</h2>
        <p style="font-size: 18px; font-weight: bold;">來指定通路拍照拿取優惠券</p>
        <button class="btn-main" onclick="confirmQuest()">按確認開始任務</button>
    </div>
</div>

<!-- 2. 夜貓子專屬彈窗 (21:00 後進入範圍自動領取) -->
<div class="modal" id="modal-night-owl">
    <div class="modal-content">
        <h2 style="color:var(--ntu-red);">🌙 夜貓子限定領取</h2>
        <p>偵測到您在 21:00 後抵達校園！</p>
        <div class="barcode-box">
            <b>7-11 兩件 75 折券</b><br>
            <b>＋賣貨便免運券</b>
        </div>
        <p style="font-size:12px; color:#666;">適用於：7-11 卓聯門市<br>（隨時皆可核銷）</p>
        <button class="btn-main" onclick="closeModal('modal-night-owl')">收下優惠，開始搜集</button>
    </div>
</div>

<!-- 3. 通路拍照啟動器 -->
<div class="modal" id="modal-camera">
    <div class="modal-content">
        <div style="font-size: 50px; margin-bottom: 10px;">📸</div>
        <h3 id="target-name" style="color:var(--ntu-red); margin:0;"></h3>
        <p>已抵達通路！請立即拍照認證。</p>
        <button class="btn-main" onclick="openCamera()">啟動鏡頭拍照</button>
    </div>
</div>

<!-- 4. 拍照後優惠券顯示 -->
<div class="modal" id="modal-coupon">
    <div class="modal-content">
        <h3 id="coupon-title">認證成功！</h3>
        <p id="coupon-desc"></p>
        <div class="barcode-box" id="barcode-text">TAISUN-CODE-99</div>
        <button class="btn-main" onclick="closeRewardModal()">完成領取，繼續前進</button>
    </div>
</div>

<!-- 5. 最終人生三格 -->
<div class="modal" id="modal-final">
    <div class="modal-content">
        <h2 style="color:var(--ntu-red);">🌟 搜集大滿貫！</h2>
        <p>你的校園人生三格已產出</p>
        <canvas id="strip-canvas" style="width:180px; border:5px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.3);"></canvas>
        <p style="font-size:12px; margin-top:10px; color:#27ae60; font-weight:bold;">打卡優惠：上傳 IG 標記領取隱藏獎勵</p>
        <button class="btn-main" style="background:#E1306C;" onclick="location.href='https://instagram.com/'">上傳 IG 分享</button>
    </div>
</div>

<!-- 強制開啟相機：capture="camera" -->
<input type="file" id="camera-trigger" accept="image/*" capture="camera">

<button id="test-btn" onclick="toggleTest()">測試模式: OFF</button>

<script>
    // 指定地點定義 (全紅標)
    const locations = {
        seven: { lat: 25.0137, lng: 121.5363, name: "7-11 卓聯門市", reward: "第2件8折" },
        family: { lat: 25.0191, lng: 121.5422, name: "全家 台大楓林店", reward: "兩件88折" },
        coop: { lat: 25.0176, lng: 121.5372, name: "台大合作社", reward: "第2件加15元多1件" }
    };

    let map = L.map('map').setView([25.0175, 121.5397], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let state = { active: false, collected: {seven:false, family:false, coop:false}, photos:[], isTest: false };

    // 初始化地圖標記 (全紅標)
    Object.keys(locations).forEach(key => {
        const l = locations[key];
        let m = L.marker([l.lat, l.lng]).addTo(map);
        m._icon.classList.add('red-marker');
        m.bindPopup(`<b>${l.name}</b><br>拍照領：${l.reward}`);
    });

    // 啟動任務對話框邏輯
    function confirmQuest() {
        state.active = true;
        closeModal('modal-welcome');
        
        // 夜貓子時間判斷 (21:00 後)
        const hour = new Date().getHours();
        if (hour >= 21 || hour < 5) {
            showModal('modal-night-owl');
        }
    }

    // 地理位置偵測邏輯
    map.locate({watch: true, enableHighAccuracy: true});
    map.on('locationfound', e => {
        if (!state.active) return;
        const u = e.latlng;
        
        for (let key in state.collected) {
            if (!state.collected[key]) {
                const loc = locations[key];
                if (map.distance(u, [loc.lat, loc.lng]) < 50 || state.isTest) {
                    triggerCameraUI(key);
                    break;
                }
            }
        }
    });

    function triggerCameraUI(key) {
        window.currentKey = key;
        document.getElementById('target-name').innerText = locations[key].name;
        showModal('modal-camera');
    }

    // 強制開啟相機
    function openCamera() { document.getElementById('camera-trigger').click(); }

    document.getElementById('camera-trigger').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                state.photos.push(ev.target.result);
                state.collected[window.currentKey] = true;
                closeModal('modal-camera');
                
                // 立即顯示條碼
                const loc = locations[window.currentKey];
                document.getElementById('coupon-desc').innerText = `已完成「${loc.name}」認證，獲得：${loc.reward}`;
                document.getElementById('barcode-text').innerText = "TAISUN-" + Math.random().toString(36).substr(2, 6).toUpperCase();
                showModal('modal-coupon');
            };
            reader.readAsDataURL(file);
        }
    });

    function closeRewardModal() {
        closeModal('modal-coupon');
        // 檢查是否集齊三站
        const count = Object.values(state.collected).filter(v => v).length;
        if (count === 3) generateStrip();
    }

    // 合成人生三格邏輯
    function generateStrip() {
        const canvas = document.getElementById('strip-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 300; canvas.height = 700;
        ctx.fillStyle = "white"; ctx.fillRect(0,0,300,700);
        
        let loaded = 0;
        state.photos.slice(0,3).forEach((src, i) => {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 20, 20 + (i * 220), 260, 200);
                loaded++;
                if (loaded === 3) {
                    ctx.fillStyle = "#8B0000"; ctx.font = "bold 20px Arial";
                    ctx.fillText("台大 × 大吸館 有料三格", 45, 680);
                    showModal('modal-final');
                }
            };
            img.src = src;
        });
    }

    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleTest() { 
        state.isTest = !state.isTest; 
        document.getElementById('test-btn').innerText = `測試模式: ${state.isTest ? 'ON' : 'OFF'}`;
    }
</script>
</body>
</html>
